<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Печать{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
        .print-toolbar { background: #f8f9fa; border-bottom: 1px solid #dee2e6;
                          padding: .5rem 1rem; position: sticky; top: 0; z-index: 10; }
        .print-page { max-width: 21cm; margin: 1rem auto; padding: 1.5cm 2cm;
                       background: white; }
        .sig-line { border-top: 1px solid #000; margin-top: 3rem;
                     padding-top: .25rem; }

        @media print {
            .print-toolbar { display: none !important; }
            .print-page { margin: 0; padding: 0; max-width: 100%;
                           box-shadow: none !important; }
            body { background: white !important; }
            a { text-decoration: none !important; color: inherit !important; }
            .page-break { break-after: page; }
        }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="print-toolbar d-flex justify-content-between align-items-center">
    <span class="text-muted small">Версия для печати — нажмите Ctrl/Cmd+P</span>
    <div>
        <button onclick="window.print()" class="btn btn-sm btn-primary">Печать</button>
        {% if back_url %}
            <a href="{{ back_url }}" class="btn btn-sm btn-link">← Назад</a>
        {% endif %}
    </div>
</div>

<div class="print-page shadow-sm">
    {% block content %}{% endblock %}
</div>

</body>
</html>
