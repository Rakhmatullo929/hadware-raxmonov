{% if too_short %}
    {% if q %}
        <div class="form-text">Введите минимум 2 символа.</div>
    {% endif %}
{% elif customers %}
    <ul class="list-group mt-1">
        {% for c in customers %}
            <li class="list-group-item list-group-item-action p-2"
                style="cursor: pointer;"
                hx-get="{% url 'rental_customer_pick' c.pk %}"
                hx-target="#customer-section"
                hx-swap="outerHTML">
                <div class="fw-semibold">{{ c.full_name }}</div>
                {% if c.phone %}<div class="small text-muted">{{ c.phone }}</div>{% endif %}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <div class="form-text">Никто не найден.</div>
{% endif %}
