<h2 class="h5 mb-2">Позиции</h2>
<div class="table-responsive mb-4">
    <table class="table table-sm align-middle">
        <thead>
            <tr>
                <th>Товар</th>
                <th class="text-end">Кол-во</th>
                <th class="text-end">Цена/сут.</th>
                <th class="text-end">Выдано</th>
                <th class="text-end">Возвращено</th>
                <th class="text-end">Не возвращено</th>
            </tr>
        </thead>
        <tbody>
            {% for it in items %}
                <tr>
                    <td>{{ it.product.name }}</td>
                    <td class="text-end">{{ it.qty }}</td>
                    <td class="text-end">{{ it.price_per_day }}</td>
                    <td class="text-end">{{ it.issued_qty }}</td>
                    <td class="text-end">{{ it.returned_qty }}</td>
                    <td class="text-end">
                        {% if it.outstanding_qty > 0 %}
                            <strong class="text-danger">{{ it.outstanding_qty }}</strong>
                        {% else %}
                            <span class="text-success">0</span>
                        {% endif %}
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
