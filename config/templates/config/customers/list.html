{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Клиенты" %} — {% trans "Учёт аренды" %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{% trans "Клиенты" %}</h1>
    <a href="{% url 'customer_create' %}" class="btn btn-primary btn-sm">
        <i class="bi bi-person-plus me-1"></i>{% trans "Клиент" %}
    </a>
</div>

<form class="row g-2 mb-3"
      hx-get="{% url 'customer_list' %}"
      hx-target="#customers-table"
      hx-swap="innerHTML"
      hx-trigger="input changed delay:300ms from:input[name=q], search"
      hx-push-url="true">
    <div class="col-md-9">
        <input type="search" class="form-control" name="q"
               value="{{ q }}" placeholder="{% trans 'Поиск по № клиента, ФИО или телефону...' %}">
    </div>
    <div class="col-md-3">
        <a href="{% url 'customer_list' %}" class="btn btn-outline-secondary w-100">{% trans "Сброс" %}</a>
    </div>
</form>

<div id="customers-table">
    {% include 'config/customers/_table.html' %}
</div>
{% endblock %}
