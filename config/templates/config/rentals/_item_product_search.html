{% load i18n %}
<div class="item-picker position-relative" id="picker-{{ row_id }}">
    <input type="search"
           class="form-control item-product-q"
           name="item_product_q"
           autocomplete="off"
           placeholder="{% trans 'Начните вводить название товара…' %}"
           hx-get="{% url 'rental_item_product_search' %}?row_id={{ row_id }}"
           hx-target="#picker-{{ row_id }}-results"
           hx-trigger="input changed delay:200ms, search"
           hx-include="this">
    <div id="picker-{{ row_id }}-results"></div>
    {% comment %}
      Скрытое поле обязательно даже при пустом значении — иначе getlist
      сместит индексы между строками и qty окажется не у того товара.
    {% endcomment %}
    <input type="hidden" name="item_product" value="" data-price="0">
</div>
