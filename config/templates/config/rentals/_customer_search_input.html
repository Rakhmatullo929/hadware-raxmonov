{% load i18n %}
<div id="customer-section" class="position-relative">
    <label class="form-label">{% trans "Клиент" %}</label>
    <div class="input-group">
        <input type="search" class="form-control"
               name="customer_q"
               autocomplete="off"
               placeholder="{% trans 'Начните вводить ФИО или телефон (≥ 2 символов)...' %}"
               hx-get="{% url 'rental_customer_search' %}"
               hx-target="#customer-search-results"
               hx-trigger="input changed delay:250ms, search"
               hx-include="this">
        <button type="button" class="btn btn-outline-primary"
                title="{% trans 'Добавить нового клиента' %}"
                hx-get="{% url 'rental_customer_create' %}"
                hx-include="[name='customer_q']"
                hx-target="#modal-slot"
                hx-swap="innerHTML">
            <i class="bi bi-person-plus me-1"></i>{% trans "Новый" %}
        </button>
    </div>
    <div id="customer-search-results"></div>
    <input type="hidden" name="customer" value="">
</div>
