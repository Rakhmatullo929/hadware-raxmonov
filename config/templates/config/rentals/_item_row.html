{% load i18n %}
<div class="row g-2 align-items-end mb-2 item-row" id="row-{{ row.row_id }}">
    <div class="col-md-5">
        <label class="form-label small text-muted mb-1">{% trans "Товар" %}</label>
        <select name="item_product"
                class="form-select"
                hx-get="{% url 'rental_product_info' %}"
                hx-trigger="change"
                hx-target="#info-{{ row.row_id }}">
            <option value="">{% trans "— Выберите товар —" %}</option>
            {% for p in products %}
                <option value="{{ p.id }}"
                        {% if row.product and row.product.pk == p.pk %}selected{% endif %}>
                    {{ p.name }} ({{ p.unit }})
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-2">
        <label class="form-label small text-muted mb-1">{% trans "Кол-во" %}</label>
        <input type="number" name="item_qty" min="1" class="form-control"
               value="{{ row.qty }}" placeholder="0">
    </div>
    <div class="col-md-4">
        <div id="info-{{ row.row_id }}" class="form-text">
            {% if row.product %}
                {% include 'config/rentals/_product_info.html' with product=row.product %}
            {% endif %}
        </div>
    </div>
    <div class="col-md-1 text-end">
        <button type="button"
                class="btn btn-outline-danger btn-sm"
                title="{% trans 'Удалить позицию' %}"
                hx-post="{% url 'rental_item_row_remove' %}"
                hx-target="#row-{{ row.row_id }}"
                hx-swap="delete">×</button>
    </div>
</div>
