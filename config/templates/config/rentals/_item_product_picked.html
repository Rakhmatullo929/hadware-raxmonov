{% load i18n l10n %}
<div class="item-picker" id="picker-{{ row_id }}">
    <div class="form-control bg-light d-flex justify-content-between align-items-center">
        <div>
            <strong>{{ product.name }}</strong>
            <span class="text-muted small ms-2">
                · {{ product.daily_price }}/{% trans "сут." %}
                · {% trans "доступно" %} {{ product.available_stock }} {{ product.unit }}
                {% if product.expected_min_days or product.expected_max_days %}
                · {% trans "срок" %}: {{ product.expected_window_label }}
                {% endif %}
            </span>
        </div>
        <button type="button" class="btn btn-sm btn-link p-0"
                hx-get="{% url 'rental_item_product_clear' %}?row_id={{ row_id }}&field_name={{ field_name|default:'item_product' }}"
                hx-target="#picker-{{ row_id }}"
                hx-swap="outerHTML">
            {% trans "сменить" %}
        </button>
    </div>
    <input type="hidden" name="{{ field_name|default:'item_product' }}"
           value="{{ product.pk }}"
           data-price="{{ product.daily_price|unlocalize }}"
           data-return-days="{{ product.expected_max_days|default:'' }}">
</div>
