{% load i18n %}
{% with w=row.worker %}
<div class="modal show d-block" tabindex="-1"
     style="background-color: rgba(0,0,0,0.5);">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="salary-entries-modal">
            <div class="modal-header">
                <h5 class="modal-title">
                    {% blocktrans with name=w.full_name month=row.month|stringformat:"02d" year=row.year %}
                        Начисления · {{ name }} · {{ month }}.{{ year }}
                    {% endblocktrans %}
                </h5>
                <button type="button" class="btn-close"
                        aria-label="{% trans 'Закрыть' %}"
                        hx-get="{% url 'rental_modal_close' %}"
                        hx-target="#modal-slot"
                        hx-swap="innerHTML"></button>
            </div>
            <div class="modal-body" id="salary-entries-body">
                {% include 'config/salary/_entries_body.html' %}
            </div>
        </div>
    </div>
</div>
{% endwith %}
